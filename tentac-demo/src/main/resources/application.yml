server:
  port: 8080

spring:
  application:
    name: tentac-demo

tentac:
  enabled: true
  title: "Tentac Demo API"
  description: "A demo API showcasing Markdown-format documentation generation with Swagger2 compatibility"
  version: "1.0.0"
  base-package: "com.github.tentac.demo"
  markdown-path: "/v2/markdown"
  llm-probe-path: "/v2/llm-probe"
  llm-probe-enabled: true
  # IP whitelist in CIDR notation
  ip-whitelist:
    - "127.0.0.1/32"
    - "0:0:0:0:0:0:0:1/128"
    - "192.168.0.0/16"
    - "10.0.0.0/8"
  # IP blacklist
  ip-blacklist: []

logging:
  level:
    com.github.tentac.tentac: DEBUG
